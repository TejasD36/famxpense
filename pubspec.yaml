name: famxpense
description: "Personal and shared expense tracking for families, friends, and groups."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  cloud_firestore: ^6.4.0
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.5.0
  firebase_core: ^4.8.0
  firebase_storage: ^13.4.0
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.2.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  hydrated_bloc: ^11.0.0
  internet_connection_checker: ^3.0.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  lottie: ^3.3.3
  path_provider: ^2.1.5
  skeletonizer: ^2.1.3
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  hive_ce_generator: ^1.11.1
  json_serializable: ^6.11.2

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/